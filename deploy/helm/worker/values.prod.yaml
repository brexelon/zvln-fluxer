# Live user-supplied values for the fluxer-worker release as of 2026-05-17T20:42:44Z.
# Captured via:  helm -n fluxer get values fluxer-worker
# Apply with:    helm upgrade fluxer-worker deploy/helm/worker -f deploy/helm/worker/values.yaml -f deploy/helm/worker/values.prod.yaml

global:
  imagePullSecret: ghcr-pull-secret
  namespace: fluxer
  registry: ""
  envFrom:
  - secretRef:
      name: fluxer-runtime-env-shared
workerBatch:
  autoscaling:
    enabled: true
    maxReplicas: 16
    minReplicas: 8
    targetCPUUtilizationPercentage: 60
  build:
    channel: stable
    version: ""
  command:
  - pnpm
  - start:worker
  image: fluxer-api
  minReadySeconds: 10
  noHealthCheck: true
  port: 8080
  replicas: 8
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
  terminationGracePeriodSeconds: 120
  env:
  - name: FLUXER_API_WORKER_MODE
    value: single_lane
  - name: FLUXER_API_WORKER_LANE
    value: batch
  - name: FLUXER_API_WORKER_ENABLE_CRON_SCHEDULER
    value: "true"
  - name: FLUXER_API_WORKER_ENABLE_VOICE_RECONCILIATION
    value: "true"
  - name: FLUXER_LIVEKIT_ENABLED
    value: "true"
  - name: FLUXER_SNOWFLAKE_SERVICE_BATCH_SIZE
    value: "128"
  - name: FLUXER_SNOWFLAKE_SERVICE_LOW_WATERMARK
    value: "32"
  - name: FLUXER_SNOWFLAKE_SERVICE_MAX_BUFFER_AGE_MS
    value: "5000"
  resources:
    limits:
      memory: 1Gi
    requests:
      cpu: 150m
      memory: 512Mi
  tag: ""
