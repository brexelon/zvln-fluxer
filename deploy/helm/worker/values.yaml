global:
  namespace: fluxer
  imagePullSecret: ghcr-pull-secret
  registry: ""

workerRealtime:
  image: fluxer-api
  tag: ''
  replicas: 2
  port: 8080
  command: ['pnpm', 'start:worker']
  noHealthCheck: true
  minReadySeconds: 10
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
  terminationGracePeriodSeconds: 120
  env:
    - name: FLUXER_API_WORKER_MODE
      value: single_lane
    - name: FLUXER_API_WORKER_LANE
      value: realtime
    - name: FLUXER_API_WORKER_ENABLE_VOICE_RECONCILIATION
      value: 'false'
    - name: FLUXER_LIVEKIT_ENABLED
      value: 'false'
    - name: FLUXER_SNOWFLAKE_SERVICE_BATCH_SIZE
      value: '128'
    - name: FLUXER_SNOWFLAKE_SERVICE_LOW_WATERMARK
      value: '32'
    - name: FLUXER_SNOWFLAKE_SERVICE_MAX_BUFFER_AGE_MS
      value: '5000'
  resources:
    requests:
      cpu: 150m
      memory: 512Mi
    limits:
      memory: 1Gi

workerUnfurl:
  image: fluxer-api
  tag: ''
  replicas: 6
  port: 8080
  command: ['pnpm', 'start:worker']
  noHealthCheck: true
  minReadySeconds: 10
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
  terminationGracePeriodSeconds: 120
  env:
    - name: NODE_OPTIONS
      value: --max-old-space-size=1024
    - name: FLUXER_API_WORKER_MODE
      value: single_lane
    - name: FLUXER_API_WORKER_LANE
      value: unfurl
    - name: FLUXER_API_WORKER_LANE_CONCURRENCY_OVERRIDES
      value: '{"unfurl":2}'
    - name: FLUXER_API_WORKER_ENABLE_VOICE_RECONCILIATION
      value: 'false'
    - name: FLUXER_LIVEKIT_ENABLED
      value: 'false'
    - name: FLUXER_SNOWFLAKE_SERVICE_BATCH_SIZE
      value: '128'
    - name: FLUXER_SNOWFLAKE_SERVICE_LOW_WATERMARK
      value: '32'
    - name: FLUXER_SNOWFLAKE_SERVICE_MAX_BUFFER_AGE_MS
      value: '5000'
  resources:
    requests:
      cpu: 150m
      memory: 768Mi
    limits:
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 6
    maxReplicas: 16
    targetCPUUtilizationPercentage: 60

workerLifecycle:
  image: fluxer-api
  tag: ''
  replicas: 2
  port: 8080
  command: ['pnpm', 'start:worker']
  noHealthCheck: true
  minReadySeconds: 10
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
  terminationGracePeriodSeconds: 120
  env:
    - name: FLUXER_API_WORKER_MODE
      value: single_lane
    - name: FLUXER_API_WORKER_LANE
      value: lifecycle
    - name: FLUXER_API_WORKER_ENABLE_VOICE_RECONCILIATION
      value: 'false'
    - name: FLUXER_LIVEKIT_ENABLED
      value: 'false'
    - name: FLUXER_SNOWFLAKE_SERVICE_BATCH_SIZE
      value: '128'
    - name: FLUXER_SNOWFLAKE_SERVICE_LOW_WATERMARK
      value: '32'
    - name: FLUXER_SNOWFLAKE_SERVICE_MAX_BUFFER_AGE_MS
      value: '5000'
  resources:
    requests:
      cpu: 150m
      memory: 512Mi
    limits:
      memory: 1Gi

workerBatch:
  image: fluxer-api
  tag: ''
  replicas: 8
  port: 8080
  command: ['pnpm', 'start:worker']
  noHealthCheck: true
  minReadySeconds: 10
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
  terminationGracePeriodSeconds: 120
  env:
    - name: FLUXER_API_WORKER_MODE
      value: single_lane
    - name: FLUXER_API_WORKER_LANE
      value: batch
    - name: FLUXER_API_WORKER_ENABLE_CRON_SCHEDULER
      value: 'true'
    - name: FLUXER_API_WORKER_ENABLE_VOICE_RECONCILIATION
      value: 'true'
    - name: FLUXER_LIVEKIT_ENABLED
      value: 'true'
    - name: FLUXER_SNOWFLAKE_SERVICE_BATCH_SIZE
      value: '128'
    - name: FLUXER_SNOWFLAKE_SERVICE_LOW_WATERMARK
      value: '32'
    - name: FLUXER_SNOWFLAKE_SERVICE_MAX_BUFFER_AGE_MS
      value: '5000'
  resources:
    requests:
      cpu: 150m
      memory: 512Mi
    limits:
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 8
    maxReplicas: 16
    targetCPUUtilizationPercentage: 60

pdb:
  minAvailable: '75%'
