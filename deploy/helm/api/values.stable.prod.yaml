#
# Live user-supplied values for the fluxer-api-stable release as of 2026-06-03T19:37:50Z.
# Captured via:  helm -n fluxer get values fluxer-api-stable
# Apply with:    helm upgrade fluxer-api-stable deploy/helm/api -f deploy/helm/api/values.yaml -f deploy/helm/api/values.stable.prod.yaml

app:
  build:
    channel: stable
    version: ""
  env:
  - name: NODE_TLS_REJECT_UNAUTHORIZED
    value: "0"
  - name: FLUXER_SNOWFLAKE_SERVICE_BATCH_SIZE
    value: "128"
  - name: FLUXER_SNOWFLAKE_SERVICE_LOW_WATERMARK
    value: "32"
  - name: FLUXER_SNOWFLAKE_SERVICE_MAX_BUFFER_AGE_MS
    value: "5000"
  - name: FLUXER_USERS_SERVICE_TIMEOUT_MS
    value: "6000"
  - name: FLUXER_MEDIA_PROXY_UPLOAD_RELAY_SECRET_BASE64
    valueFrom:
      secretKeyRef:
        key: relay_secret_base64
        name: fluxer-upload-relay
  image: fluxer-api
  name: api
  port: 8080
  replicas: 31
  minReadySeconds: 15
  terminationGracePeriodSeconds: 90
  preStopDrain:
    enabled: true
    path: /_health
    sleepSeconds: 25
    timeoutSeconds: 2
    retryCount: 3
    retryIntervalSeconds: 1
  resources:
    limits:
      memory: 4Gi
    requests:
      cpu: 200m
      memory: 512Mi
  startupProbe:
    enabled: true
    failureThreshold: 24
    path: /_health
    periodSeconds: 5
    timeoutSeconds: 2
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1
  tag: ""
canary:
  env:
  - name: NODE_TLS_REJECT_UNAUTHORIZED
    value: "0"
  - name: FLUXER_SNOWFLAKE_SERVICE_BATCH_SIZE
    value: "128"
  - name: FLUXER_SNOWFLAKE_SERVICE_LOW_WATERMARK
    value: "32"
  - name: FLUXER_SNOWFLAKE_SERVICE_MAX_BUFFER_AGE_MS
    value: "5000"
  - name: FLUXER_MEDIA_PROXY_UPLOAD_RELAY_SECRET_BASE64
    valueFrom:
      secretKeyRef:
        key: relay_secret_base64
        name: fluxer-upload-relay
  image: fluxer-api
  port: 8080
  replicas: 2
  minReadySeconds: 15
  terminationGracePeriodSeconds: 90
  preStopDrain:
    enabled: true
    path: /_health
    sleepSeconds: 25
    timeoutSeconds: 2
    retryCount: 3
    retryIntervalSeconds: 1
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
  resources:
    limits:
      memory: 4Gi
    requests:
      cpu: 200m
      memory: 512Mi
  startupProbe:
    enabled: true
    failureThreshold: 24
    path: /_health
    periodSeconds: 5
    timeoutSeconds: 2
  tag: ""
global:
  imagePullSecret: ghcr-pull-secret
  namespace: fluxer
  registry: ""
  envFrom:
  - secretRef:
      name: fluxer-runtime-env-stable
pdb:
  minAvailable: 75%
