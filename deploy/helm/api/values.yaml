global:
  namespace: fluxer
  imagePullSecret: ghcr-pull-secret
  registry: ""

app:
  name: ''
  image: ''
  tag: ''
  replicas: 2
  port: 8080
  minReadySeconds: 15
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
  terminationGracePeriodSeconds: 90
  preStopDrain:
    enabled: true
    path: /_health
    sleepSeconds: 25
    timeoutSeconds: 2
    retryCount: 3
    retryIntervalSeconds: 1
  startupProbe:
    enabled: true
    path: /_health
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 24
  env:
    - name: NODE_TLS_REJECT_UNAUTHORIZED
      value: '0'
    - name: FLUXER_SNOWFLAKE_SERVICE_BATCH_SIZE
      value: '128'
    - name: FLUXER_SNOWFLAKE_SERVICE_LOW_WATERMARK
      value: '32'
    - name: FLUXER_SNOWFLAKE_SERVICE_MAX_BUFFER_AGE_MS
      value: '5000'
    - name: FLUXER_MEDIA_PROXY_UPLOAD_RELAY_SECRET_BASE64
      valueFrom:
        secretKeyRef:
          name: fluxer-upload-relay
          key: relay_secret_base64
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      memory: 4Gi

canary:
  image: fluxer-api
  tag: ''
  replicas: 2
  port: 8080
  minReadySeconds: 15
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
  terminationGracePeriodSeconds: 90
  preStopDrain:
    enabled: true
    path: /_health
    sleepSeconds: 25
    timeoutSeconds: 2
    retryCount: 3
    retryIntervalSeconds: 1
  startupProbe:
    enabled: true
    path: /_health
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 24
  env:
    - name: NODE_TLS_REJECT_UNAUTHORIZED
      value: '0'
    - name: FLUXER_SNOWFLAKE_SERVICE_BATCH_SIZE
      value: '128'
    - name: FLUXER_SNOWFLAKE_SERVICE_LOW_WATERMARK
      value: '32'
    - name: FLUXER_SNOWFLAKE_SERVICE_MAX_BUFFER_AGE_MS
      value: '5000'
    - name: FLUXER_MEDIA_PROXY_UPLOAD_RELAY_SECRET_BASE64
      valueFrom:
        secretKeyRef:
          name: fluxer-upload-relay
          key: relay_secret_base64
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      memory: 4Gi

pdb:
  minAvailable: '75%'
