#
# Live user-supplied values for the fluxer-gateway release as of 2026-05-23T21:25:52Z.
# Captured via:  helm -n fluxer get values fluxer-gateway
# Apply with:    helm upgrade fluxer-gateway deploy/helm/gateway -f deploy/helm/gateway/values.yaml -f deploy/helm/gateway/values.prod.yaml

cluster:
  discoveryDnsName: fluxer-gateway-headless.fluxer.svc.cluster.local
  discoveryNodeBasename: fluxer_gateway
  discoveryPollIntervalMs: 5000
  enabled: true
  erlangCookieSecret:
    key: cookie
    name: fluxer-gateway-erlang-cookie
  erlangDistribution:
    epmdPort: 4369
    port: 8081

gateway:
  build:
    channel: stable
    version: ""
  env:
  - name: FLUXER_GATEWAY_STATIC_CDN_ENDPOINT
    value: "https://fluxerstatic.com"
  - name: FLUXER_GATEWAY_PRESENCE_PUSH_BUFFER_MAX_ENTRIES
    value: "128"
  - name: FLUXER_GATEWAY_PRESENCE_PUSH_BUFFER_MAX_BYTES
    value: "1048576"
  image: fluxer-gateway
  hotpatch:
    enabled: true
    cassandraHosts: int.flx-nyc-db1.srv.fluxer.dev
    cassandraPort: 9041
    cassandraKeyspace: fluxer
    pollIntervalMs: 5000
    startupSyncTimeoutMs: 30000
    publicKeysSecret:
      name: fluxer-gateway-hotpatch-public-keys
      key: public_keys
    cassandraCredentialsSecret:
      name: fluxer-runtime-env-shared
      usernameKey: FLUXER_CASSANDRA_USERNAME
      passwordKey: FLUXER_CASSANDRA_PASSWORD
  livenessProbe:
    timeoutSeconds: 5
  minReadySeconds: 0
  nodeSelector: null
  port: 8080
  preStopDrain:
    enabled: true
    retryCount: 6
    retryIntervalSeconds: 1
    sleepSeconds: 30
    timeoutSeconds: 2
  preserveLiveReplicas: false
  readinessProbe:
    execEnabled: true
    failureThreshold: 3
    initialDelaySeconds: 5
    path: /_health/ready
    periodSeconds: 5
    timeoutSeconds: 5
  replicas: 16
  resources:
    limits:
      memory: 16Gi
    requests:
      cpu: 500m
      memory: 512Mi
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1
  startupProbe:
    enabled: true
    failureThreshold: 30
    initialDelaySeconds: 0
    path: /_health
    periodSeconds: 5
    timeoutSeconds: 5
  tag: ""
  terminationGracePeriodSeconds: 45
  tolerations:
  - effect: NoSchedule
    key: dedicated
    operator: Equal
    value: gateway
roles:
  enabled: true
  websocket:
    role: websocket
  common:
    nodeSelector: null
    resources:
      requests:
        cpu: 500m
        memory: 768Mi
      limits:
        memory: 12Gi
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 60
          preference:
            matchExpressions:
            - key: node.kubernetes.io/instance-type
              operator: In
              values:
              - vhf-16c-58gb
  sessions:
    enabled: true
    replicas: 12
    resources:
      requests:
        cpu: 750m
        memory: 2Gi
      limits:
        memory: 16Gi
  presence:
    enabled: true
    replicas: 6
    resources:
      requests:
        cpu: 500m
        memory: 768Mi
      limits:
        memory: 6Gi
  guilds:
    enabled: true
    replicas: 12
    resources:
      requests:
        cpu: 750m
        memory: 1Gi
      limits:
        memory: 8Gi
  calls:
    enabled: true
    replicas: 4
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        memory: 4Gi
  push:
    enabled: true
    replicas: 4
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        memory: 4Gi
global:
  imagePullSecret: ghcr-pull-secret
  namespace: fluxer
  registry: ""
  envFrom:
  - secretRef:
      name: fluxer-runtime-env-shared
pdb:
  enabled: false
  minAvailable: 1
