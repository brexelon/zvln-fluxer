global:
  namespace: fluxer
  imagePullSecret: ghcr-pull-secret
  registry: ""

gateway:
  image: fluxer-gateway
  tag: ''
  replicas: 1
  preserveLiveReplicas: false
  port: 8080
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1
  minReadySeconds: 0
  terminationGracePeriodSeconds: 45
  readinessProbe:
    path: /_health/ready
    execEnabled: true
    timeoutSeconds: 5
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3
  livenessProbe:
    timeoutSeconds: 5
  startupProbe:
    enabled: true
    path: /_health
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 30
    timeoutSeconds: 5
  preStopDrain:
    enabled: true
    sleepSeconds: 30
    timeoutSeconds: 2
    retryCount: 6
    retryIntervalSeconds: 1
  nodeSelector:
    kubernetes.io/hostname: flx-nyc-k8s-worker-efd1167e6219
  tolerations:
    - key: dedicated
      operator: Equal
      value: gateway
      effect: NoSchedule
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      memory: 16Gi
  env:
    - name: FLUXER_GATEWAY_STATIC_CDN_ENDPOINT
      value: "https://fluxerstatic.com"
    - name: FLUXER_GATEWAY_PRESENCE_PUSH_BUFFER_MAX_ENTRIES
      value: "128"
    - name: FLUXER_GATEWAY_PRESENCE_PUSH_BUFFER_MAX_BYTES
      value: "1048576"
  hotpatch:
    enabled: false
    cassandraHosts: ''
    cassandraPort: 9042
    cassandraKeyspace: fluxer
    pollIntervalMs: 5000
    startupSyncTimeoutMs: 30000
    publicKeysSecret:
      name: ''
      key: public_keys
    cassandraCredentialsSecret:
      name: ''
      usernameKey: username
      passwordKey: password

cluster:
  enabled: false
  discoveryDnsName: ''
  discoveryNodeBasename: fluxer_gateway
  discoveryPollIntervalMs: 5000
  erlangDistribution:
    port: 8081
    epmdPort: 4369
  erlangCookieSecret:
    name: fluxer-gateway-erlang-cookie
    key: cookie

roles:
  enabled: false
  websocket:
    role: websocket
  common:
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        memory: 8Gi
  sessions:
    enabled: true
    replicas: 1
  presence:
    enabled: true
    replicas: 1
  guilds:
    enabled: true
    replicas: 1
  calls:
    enabled: true
    replicas: 1
  push:
    enabled: true
    replicas: 1

pdb:
  enabled: false
  minAvailable: 1
