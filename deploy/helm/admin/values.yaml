global:
  namespace: fluxer
  imagePullSecret: ghcr-pull-secret
  registry: ""

app:
  name: ''
  image: ''
  tag: ''
  replicas: 2
  port: 8080
  config: ''
  minReadySeconds: 10
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
  terminationGracePeriodSeconds: 60
  startupProbe:
    enabled: true
    path: /_health
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 24
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

pdb:
  minAvailable: '50%'
