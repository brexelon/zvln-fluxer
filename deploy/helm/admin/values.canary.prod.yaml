# Live user-supplied values for the fluxer-admin-canary release as of 2026-05-17T20:42:36Z.
# Captured via:  helm -n fluxer get values fluxer-admin-canary
# Apply with:    helm upgrade fluxer-admin-canary deploy/helm/admin -f deploy/helm/admin/values.yaml -f deploy/helm/admin/values.canary.prod.yaml

app:
  build:
    channel: canary
    version: ""
  image: fluxer-admin
  name: admin-canary
  port: 8080
  replicas: 2
  minReadySeconds: 10
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
  terminationGracePeriodSeconds: 60
  startupProbe:
    enabled: true
    path: /_health
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 24
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  tag: ""
global:
  imagePullSecret: ghcr-pull-secret
  namespace: fluxer
  registry: ""
  envFrom:
  - secretRef:
      name: fluxer-runtime-env-canary
pdb:
  minAvailable: 50%
