global:
  imagePullSecret: ghcr-pull-secret
  namespace: fluxer
  registry: ""
ingress:
  className: nginx
  hosts:
    admin: admin.fluxer.app
    adminCanary: admin.canary.fluxer.app
    api: api.fluxer.app
    apiCanary: api.canary.fluxer.app
    appProxy: web.fluxer.app
    appProxyCanary: web.canary.fluxer.app
    gateway: gateway.fluxer.app
    help: help.fluxer.app
    blog: blog.fluxer.app
    docs: docs.fluxer.app
    marketing: fluxer.app
    marketingAliases:
      - www.fluxer.app
      - fluxerapp.com
      - www.fluxerapp.com
      - fluxer.gg
      - fluxer.gift
      - fluxer.dev
      - www.fluxer.dev
      - every.day.im.fluxer.ing
    marketingCanary: canary.fluxer.app
    mediaProxy: fluxerusercontent.com
    staticProxy: fluxerstatic.com
nats:
  clientPort: 4222
  clusterPort: 6222
  image: nats
  maxConnections: 2048
  monitorPort: 8222
  replicas: 5
  resources:
    limits:
      memory: 2Gi
    requests:
      cpu: 100m
      memory: 512Mi
  tag: 2-alpine
ports:
  admin: 8080
  adminCanary: 8080
  api: 8080
  apiCanary: 8080
  appProxy: 8080
  appProxyCanary: 8080
  gateway: 8080
  marketing: 8080
  marketingCanary: 8080
  docs: 8080
  mediaProxy: 8080
  staticProxy: 8080
valkey:
  image: valkey/valkey
  port: 6379
  replicas: 1
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  tag: 8-alpine
