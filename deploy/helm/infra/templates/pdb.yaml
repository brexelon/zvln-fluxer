apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nats-pdb
  namespace: {{.Values.global.namespace}}
  labels: {{- include "fluxer.labels" . | nindent 4}}
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
      app.kubernetes.io/instance: {{.Release.Name}}
