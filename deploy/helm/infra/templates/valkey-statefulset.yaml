apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: valkey
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "fluxer.labels" . | nindent 4 }}
    app.kubernetes.io/name: valkey
spec:
  serviceName: valkey-headless
  replicas: {{ .Values.valkey.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: valkey
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "fluxer.labels" . | nindent 8 }}
        app.kubernetes.io/name: valkey
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      terminationGracePeriodSeconds: 15
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: valkey
          image: {{ .Values.valkey.image }}:{{ .Values.valkey.tag }}
          command:
            - valkey-server
            - --save
            - ""
            - --appendonly
            - "no"
            - --maxmemory
            - {{ .Values.valkey.maxmemory | quote }}
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - name: valkey
              containerPort: {{ .Values.valkey.port }}
          livenessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.valkey.resources | nindent 12 }}
