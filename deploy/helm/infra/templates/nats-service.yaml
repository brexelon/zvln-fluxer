apiVersion: v1
kind: Service
metadata:
  name: nats-headless
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "fluxer.labels" . | nindent 4 }}
    app.kubernetes.io/name: nats
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: client
      port: {{ .Values.nats.clientPort }}
      targetPort: client
    - name: cluster
      port: {{ .Values.nats.clusterPort }}
      targetPort: cluster
    - name: monitor
      port: {{ .Values.nats.monitorPort }}
      targetPort: monitor
  selector:
    app.kubernetes.io/name: nats
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: v1
kind: Service
metadata:
  name: nats-core
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "fluxer.labels" . | nindent 4 }}
    app.kubernetes.io/name: nats
spec:
  type: ClusterIP
  ports:
    - name: client
      port: {{ .Values.nats.clientPort }}
      targetPort: client
  selector:
    app.kubernetes.io/name: nats
    app.kubernetes.io/instance: {{ .Release.Name }}
