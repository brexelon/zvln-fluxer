# SPDX-License-Identifier: AGPL-3.0-or-later

global:
  namespace: fluxer
  imagePullSecret: ghcr-pull-secret
  registry: ""

svc:
  name: snowflakes
  image: fluxer-snowflakes
  tag: ''
  shard:
    replicas: 4
    port: 8090
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        memory: 128Mi
  router:
    replicas: 2
    port: 8090
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        memory: 128Mi
  nats:
    url: nats://nats-core:4222
  cache:
    maxEntries: 100000
    ttlMs: 30000
  maxConcurrentRequests: 128
  extraEnv: []
  nodeSelector: {}
  tolerations: []

pdb:
  minAvailable: '50%'
