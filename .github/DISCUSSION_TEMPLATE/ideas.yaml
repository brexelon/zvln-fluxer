body:
  - type: markdown
    attributes:
      value: |
        Search existing discussions before posting.
        Report security issues at https://fluxer.app/security.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve, and for whom?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add constraints, tradeoffs, screenshots, or links.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing discussions.
          required: true
