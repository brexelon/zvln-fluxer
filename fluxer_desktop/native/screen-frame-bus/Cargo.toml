[package]
name = "fluxer_screen_frame_bus"
version = "0.0.0"
edition = "2024"
license = "AGPL-3.0-or-later"
publish = false

[workspace]
resolver = "2"

[lib]
crate-type = ["rlib"]

[features]
default = []
wgpu = ["dep:wgpu", "fluxer_gpu_rebuild/wgpu"]

[dependencies]
parking_lot = "0.12"
wgpu = { version = "29", optional = true }
fluxer_gpu_rebuild = { path = "../gpu-rebuild" }

[dev-dependencies]
criterion = { version = "0.8", default-features = false, features = ["cargo_bench_support"] }

[[bench]]
name = "staging"
harness = false

[[bench]]
name = "frame_pool"
harness = false
