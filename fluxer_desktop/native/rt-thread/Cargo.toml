[package]
name = "fluxer_rt_thread"
version = "0.0.0"
edition = "2024"
license = "AGPL-3.0-or-later"
publish = false

[workspace]
resolver = "2"

[lib]
crate-type = ["rlib"]

[dependencies]

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(target_os = "windows")'.dependencies]
windows = {version = "0.62.2", features = [
	"Win32_Foundation",
	"Win32_System_Threading",
	"Win32_Media",
	"Win32_Media_Multimedia",
]}

[dev-dependencies]
criterion = "0.8"

[[bench]]
name = "tick"
harness = false
