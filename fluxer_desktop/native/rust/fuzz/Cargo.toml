[package]
name = "fluxer_desktop_native_fuzz"
version = "0.0.0"
edition = "2024"
publish = false

[workspace]
resolver = "2"

[package.metadata]
cargo-fuzz = true

[dependencies]
arbitrary = {version = "1.4", features = ["derive"]}
fluxer_desktop_native = {path = ".."}
libfuzzer-sys = "0.4"

[[bin]]
name = "routing"
path = "fuzz_targets/routing.rs"
test = false
doc = false

[[bin]]
name = "pid_payload"
path = "fuzz_targets/pid_payload.rs"
test = false
doc = false

[[bin]]
name = "audio_converter"
path = "fuzz_targets/audio_converter.rs"
test = false
doc = false

[[bin]]
name = "evdev_event"
path = "fuzz_targets/evdev_event.rs"
test = false
doc = false

[[bin]]
name = "process_tree"
path = "fuzz_targets/process_tree.rs"
test = false
doc = false
