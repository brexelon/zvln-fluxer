syntax = "proto3";

package fluxer.read_state.v1;

import "google/protobuf/timestamp.proto";

message ReadStateEntry {
  uint64 channel_id = 1;
  optional uint64 last_message_id = 2;
  uint32 mention_count = 3;
  google.protobuf.Timestamp last_pin_timestamp = 4;
  optional uint64 version = 5;
}

message ReadStateBundle {
  repeated ReadStateEntry read_states = 1;
}
