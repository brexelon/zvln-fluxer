[package]
name = "fluxer_markdown_parser"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[[bench]]
name = "parser"
harness = false

[[bin]]
name = "markdown-stress"
path = "src/bin/stress.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[dev-dependencies]
criterion = { version = "0.8", default-features = false, features = ["cargo_bench_support"] }
proptest = "1.11"
